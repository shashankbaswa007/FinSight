# ═══════════════════════════════════════════════════════════════
# FinSight – Test Configuration (uses H2 in-memory database)
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight-Test

# ──── H2 In-Memory Database for Testing ────
spring.datasource.url=jdbc:h2:mem:finsight_test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ──── JPA ────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ──── JWT ────
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=
app.jwt.expiration-ms=86400000

# ──── Disable seed data for tests ────
spring.sql.init.mode=never
