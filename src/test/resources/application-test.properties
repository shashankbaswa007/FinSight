# ═══════════════════════════════════════════════════════════════
# FinSight – Test Configuration (uses H2 in-memory database)
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight-Test

# ──── H2 In-Memory Database for Testing ────
spring.datasource.url=jdbc:h2:mem:finsight_test;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ──── JPA ────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Flyway for tests (H2 uses ddl-auto=create-drop)
spring.flyway.enabled=false

# Disable seed data for tests
spring.sql.init.mode=never

# ──── JWT ────
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=
app.jwt.expiration-ms=86400000

# ──── Redis / Cache ────
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# ──── Rate Limiting ────
app.rate-limit.max-requests=10000
