# ═══════════════════════════════════════════════════════════════
# FinSight – Docker Environment Configuration
# ═══════════════════════════════════════════════════════════════

# Inherits from application.properties, overrides for Docker environment

# ──── Spring Profile ────
spring.profiles.active=docker

# ──── Server ────
server.port=8080
server.servlet.context-path=/

# ──── Logging (Docker enables ELK stack) ────
logging.level.root=INFO
logging.level.com.finsight=DEBUG
logging.file.name=/app/logs/finsight.log
logging.file.max-size=10MB
logging.file.max-history=30

# ──── Resilience4j Monitoring ────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,retries,prometheus
management.endpoint.health.show-details=always
management.health.elasticsearch.enabled=false

# ──── Metrics Export ────
management.metrics.export.prometheus.enabled=true
management.endpoints.web.base-path=/actuator

# ──── JSON Logging for ELK ────
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
