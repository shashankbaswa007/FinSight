# ═══════════════════════════════════════════════════════════════
# FinSight – Production Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight

# ──── Database (MySQL) ────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finsight?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:finsight_user}
spring.datasource.password=${DATABASE_PASSWORD:finsight_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# ──── JPA / Hibernate ────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ──── Flyway ────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ──── JWT ────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ──── Jasypt Encryption Configuration ────
# CRITICAL: Set JASYPT_ENCRYPTOR_PASSWORD environment variable in production
# This password is used to derive the AES-256 encryption key
# Never store this in code or version control!
# Format: Any string (recommended: 32+ characters, alphanumeric + special chars)
# Example: export JASYPT_ENCRYPTOR_PASSWORD="SuperSecureRandomPassword!@#$%^&*()"
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD}
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.key-obtention-iterations=1000
jasypt.encryptor.pool-size=2
jasypt.encryptor.provider-name=SunJCE
jasypt.encryptor.salt-generator-classname=org.jasypt.salt.RandomSaltGenerator
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.string-output-type=base64

# ──── CORS ────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://finsight.example.com}

# ──── Swagger (disabled in prod) ────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ──── Actuator ────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ──── Redis (enable in prod) ────
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ──── Kafka (event streaming) ────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.client-id=finsight-service
spring.kafka.consumer.group-id=finsight-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

finsight.kafka.topics.reconciliation=reconciliation.events
finsight.kafka.topics.notifications=notification.events
finsight.kafka.topics.webhooks=webhook.events
finsight.kafka.topics.digests=notification.digests
finsight.kafka.topics.dlq=deadletter.events
finsight.kafka.outbox.enabled=true
finsight.kafka.outbox.poll-interval-ms=5000
finsight.kafka.outbox.max-attempts=5
finsight.kafka.webhooks.enabled=true
finsight.kafka.digests.enabled=true
finsight.webhook.delivery.enabled=true
finsight.webhook.delivery.poll-interval-ms=5000
finsight.webhook.delivery.timeout-seconds=10
finsight.notifications.digest.enabled=true
finsight.notifications.digest.cron=0 0 8 * * *
finsight.notifications.digest.weekly-day=MONDAY
finsight.notifications.digest.max-items=100
finsight.notifications.email.enabled=false

# ──── Server ────
server.port=${PORT:8080}

# ──── Seed data (disabled in prod) ────
spring.sql.init.mode=never
