# ═══════════════════════════════════════════════════════════════
# FinSight – Production Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight

# ──── Database (MySQL) ────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finsight?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:finsight_user}
spring.datasource.password=${DATABASE_PASSWORD:finsight_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# ──── JPA / Hibernate ────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ──── Flyway ────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ──── JWT ────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ──── CORS ────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://finsight.example.com}

# ──── Swagger (disabled in prod) ────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ──── Actuator ────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ──── Redis (enable in prod) ────
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ──── Server ────
server.port=${PORT:8080}

# ──── Seed data (disabled in prod) ────
spring.sql.init.mode=never
