# ═══════════════════════════════════════════════════════════════
# FinSight – Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight

# ──── Database (MySQL) ────
spring.datasource.url=jdbc:mysql://localhost:3306/finsight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=finsight_user
spring.datasource.password=finsight_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──── JPA / Hibernate ────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ──── JWT Configuration ────
# Base64-encoded 256-bit secret (replace in production!)
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# ──── Swagger / OpenAPI ────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ──── Actuator ────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ──── Redis (optional – uncomment to enable caching) ────
# spring.cache.type=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ──── Server ────
server.port=8080

# ──── Seed data (runs data.sql on startup when set to always) ────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
