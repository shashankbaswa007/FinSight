# ═══════════════════════════════════════════════════════════════
# FinSight – Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight

# ──── Database (MySQL) ────
spring.datasource.url=jdbc:mysql://localhost:3306/finsight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=finsight_user
spring.datasource.password=finsight_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──── JPA / Hibernate ────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ──── Flyway Database Migrations ────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ──── JWT Configuration ────
# Base64-encoded 256-bit secret – override via JWT_SECRET env variable in production
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=}
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# ──── Swagger / OpenAPI ────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ──── Actuator ────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ──── Redis (optional – uncomment to enable caching) ────
# spring.cache.type=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ──── Server ────
server.port=8080

# ──── Seed data ────
# Flyway handles schema; data.sql seeds categories after migrations
spring.sql.init.mode=never

# ──── CORS ────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ──── Demo profile (remove to disable demo data seeding) ────

spring.profiles.active=demo