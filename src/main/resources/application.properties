# ═══════════════════════════════════════════════════════════════
# FinSight – Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=FinSight

# ──── Database (MySQL) ────
spring.datasource.url=jdbc:mysql://localhost:3306/finsight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=finsight_user
spring.datasource.password=finsight_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──── JPA / Hibernate ────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ──── Flyway Database Migrations ────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ──── JWT Configuration ────
# Base64-encoded 256-bit secret – override via JWT_SECRET env variable in production
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=}
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# ──── Jasypt Encryption Configuration ────
# Password for encryption/decryption – MUST be set via JASYPT_ENCRYPTOR_PASSWORD env variable in production
# Algorithm: PBEWITHHMACSHA512ANDAES_256 (AES-256 encryption)
# Default dev password should NOT be used in production
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD:dev-encryptor-password-change-in-production}
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.key-obtention-iterations=1000
jasypt.encryptor.pool-size=1
jasypt.encryptor.provider-name=SunJCE
jasypt.encryptor.salt-generator-classname=org.jasypt.salt.RandomSaltGenerator
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.string-output-type=base64

# ──── Swagger / OpenAPI ────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ──── Actuator ────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,retries
management.endpoint.health.show-details=when-authorized
management.health.circuitbreakers.enabled=true
management.metrics.export.simple.enabled=true

# ──── Resilience4j - Circuit Breaker Pattern ────
# Circuit breaker for external API calls
resilience4j.circuitbreaker.instances.externalApi.register-health-indicator=true
resilience4j.circuitbreaker.instances.externalApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalApi.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.externalApi.slow-call-duration-threshold=2000
resilience4j.circuitbreaker.instances.externalApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.externalApi.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.externalApi.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.instances.externalApi.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.externalApi.event-consumer-buffer-size=10

# Retry configuration for external API calls
resilience4j.retry.instances.externalApi.max-attempts=3
resilience4j.retry.instances.externalApi.wait-duration=2000
resilience4j.retry.instances.externalApi.retry-exceptions=java.net.ConnectException,java.io.IOException
resilience4j.retry.instances.externalApi.ignore-exceptions=java.lang.IllegalArgumentException

# Rate limiter for external API calls
resilience4j.ratelimiter.instances.externalApi.register-health-indicator=false
resilience4j.ratelimiter.instances.externalApi.limit-refresh-period=1m
resilience4j.ratelimiter.instances.externalApi.limit-for-period=100
resilience4j.ratelimiter.instances.externalApi.timeout-duration=5s

# Circuit breaker for Ollama local AI
resilience4j.circuitbreaker.instances.ollamaAi.register-health-indicator=true
resilience4j.circuitbreaker.instances.ollamaAi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ollamaAi.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ollamaAi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ollamaAi.minimum-number-of-calls=5

# ──── Spring AI Ollama Configuration ────
spring.ai.ollama.base-url=http://127.0.0.1:11434
spring.ai.ollama.chat.model=phi3
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.vectorstore.simple.path=vector-store.json

# ──── Redis (optional – uncomment to enable caching) ────
# spring.cache.type=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

# ──── Kafka (event streaming) ────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.client-id=finsight-service
spring.kafka.consumer.group-id=finsight-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

finsight.kafka.topics.reconciliation=reconciliation.events
finsight.kafka.topics.notifications=notification.events
finsight.kafka.topics.webhooks=webhook.events
finsight.kafka.topics.digests=notification.digests
finsight.kafka.topics.dlq=deadletter.events
finsight.kafka.outbox.enabled=true
finsight.kafka.outbox.poll-interval-ms=5000
finsight.kafka.outbox.max-attempts=5
finsight.kafka.webhooks.enabled=true
finsight.kafka.digests.enabled=true
finsight.webhook.delivery.enabled=true
finsight.webhook.delivery.poll-interval-ms=5000
finsight.webhook.delivery.timeout-seconds=10
finsight.notifications.digest.enabled=true
finsight.notifications.digest.cron=0 0 8 * * *
finsight.notifications.digest.weekly-day=MONDAY
finsight.notifications.digest.max-items=100
finsight.notifications.email.enabled=false

# ──── Server ────
server.port=8080

# ──── Seed data ────
# Flyway handles schema; data.sql seeds categories after migrations
spring.sql.init.mode=never

# ──── CORS ────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ──── Demo profile (remove to disable demo data seeding) ────

spring.profiles.active=demo

# Phase 3: Scheduled reconciliation configuration
# Disabled by default to avoid running in development/test environments.
finsight.reconciliation.scheduled.enabled=false
finsight.reconciliation.scheduled.cron=0 0 2 * * *