# Logstash configuration for FinSight application logs

input {
  # Read JSON logs from file
  file {
    path => "/logs/*.json"
    start_position => "beginning"
    codec => json
    tags => ["finsight-json"]
  }
  
  # TCP input for real-time log streaming
  tcp {
    port => 5000
    codec => json
    tags => ["finsight-tcp"]
  }
  
  # UDP input for syslog-style logging
  udp {
    port => 5000
    tags => ["finsight-udp"]
  }
}

filter {
  # Parse JSON logs
  if [type] == "json" {
    json {
      source => "message"
      target => "log_data"
    }
  }
  
  # Extract fields from log data
  if [log_data] {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "finsight-logs-%{+YYYY.MM.dd}"
      }
      add_field => {
        "correlation_id" => "%{[log_data][correlationId]}"
        "user_id" => "%{[log_data][userId]}"
        "request_id" => "%{[log_data][requestId]}"
        "logger_name" => "%{[log_data][loggerName]}"
        "level" => "%{[log_data][level]}"
        "message" => "%{[log_data][message]}"
        "timestamp" => "%{[log_data][timestamp]}"
      }
    }
  }
  
  # Add application metadata
  mutate {
    add_field => {
      "environment" => "docker"
      "service" => "finsight"
      "version" => "1.0.0"
    }
  }
  
  # Parse timestamps
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "UTC"
  }
  
  # Clean up fields
  mutate {
    remove_field => ["log_data"]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "finsight-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # Log to console for debugging
  stdout {
    codec => rubydebug
  }
}
