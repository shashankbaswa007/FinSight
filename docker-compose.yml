# ═══════════════════════════════════════════════════════════════
# FinSight – Docker Compose
# Starts MySQL, Redis, and the Spring Boot application.
# ═══════════════════════════════════════════════════════════════

version: '3.9'

services:
  # ──── MySQL Database ────
  mysql:
    image: mysql:8.0
    container_name: finsight-mysql
    environment:
      MYSQL_DATABASE: finsight
      MYSQL_USER: finsight_user
      MYSQL_PASSWORD: finsight_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "finsight_user", "-pfinsight_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──── Redis (optional caching) ────
  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──── FinSight Backend ────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsight-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/finsight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: finsight_user
      DATABASE_PASSWORD: finsight_pass
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBmaW5zaWdodCBhcHA=}
      CORS_ALLOWED_ORIGINS: http://localhost
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  # ──── FinSight Frontend ────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  mysqldata:
